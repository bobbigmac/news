<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>The Daily Broadsheet</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="A daily news digest. No clickbait, just the facts. Stories clustered and summarised by AI.">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-content">
      <h3>Settings</h3>
      <label class="setting-row">
        <span>Font size</span>
        <select id="setting-fontsize">
          <option value="small">Small</option>
          <option value="medium" selected>Medium</option>
          <option value="large">Large</option>
        </select>
      </label>
      <label class="setting-row">
        <span>Columns</span>
        <select id="setting-columns">
          <option value="1">1 column</option>
          <option value="2" selected>2 columns</option>
          <option value="3">3 columns</option>
        </select>
      </label>
      <label class="setting-row">
        <span>Sort by</span>
        <select id="setting-sort">
          <option value="stories" selected>Most stories</option>
          <option value="recent">Most recent</option>
          <option value="category">By category</option>
        </select>
      </label>
      <label class="setting-row checkbox-row">
        <input type="checkbox" id="setting-showsource">
        <span>Show source names</span>
      </label>
      <label class="setting-row checkbox-row">
        <input type="checkbox" id="setting-expandall">
        <span>Expand all story links</span>
      </label>
      <label class="setting-row checkbox-row">
        <input type="checkbox" id="setting-showupdated">
        <span>Show updated stories</span>
      </label>
      <button id="settings-close" class="settings-close">Close</button>
    </div>
  </div>

  <header class="masthead">
    <div class="masthead-date" id="masthead-date"></div>
    <h1 class="masthead-title">The Daily Broadsheet</h1>
    <button id="settings-toggle" class="settings-toggle" aria-label="Settings">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <div class="search-bar">
    <input type="search" id="filter" placeholder="Search the broadsheet..." />
  </div>

  <main id="broadsheet" class="broadsheet">
    <div id="loading" class="loading">Loading today's news...</div>
  </main>

  <footer class="broadsheet-footer">
    <p>Generated by AI from <a href="https://currentsapi.services" target="_blank" rel="noopener">Currents API</a> &middot; Summarised via <a href="https://openrouter.ai" target="_blank" rel="noopener">OpenRouter</a></p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
