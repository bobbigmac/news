<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>The Daily Broadsheet</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="description" content="A daily news digest. No clickbait, just the facts. Stories clustered and summarised by AI.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=OpenDyslexic:wght@400;700&family=Outfit:wght@200;300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="settings-panel" class="settings-panel hidden">
    <div class="settings-content">
      <h3>Settings</h3>
      <div class="setting-row">
        <span>Font</span>
        <button id="setting-font" class="cycle-btn" type="button">Serif</button>
      </div>
      <div class="setting-row">
        <span>Size</span>
        <button id="setting-fontsize" class="cycle-btn" type="button">Medium</button>
      </div>
      <div class="setting-row">
        <span>Columns</span>
        <button id="setting-columns" class="cycle-btn" type="button">3</button>
      </div>
      <div class="setting-row">
        <span>Sort</span>
        <button id="setting-sort" class="cycle-btn" type="button">Most stories</button>
      </div>
      <div class="setting-row">
        <span>Images</span>
        <button id="setting-images" class="cycle-btn" type="button">Minimal</button>
      </div>
      <label class="setting-row checkbox-row">
        <input type="checkbox" id="setting-showsource">
        <span>Show source names</span>
      </label>
      <label class="setting-row checkbox-row">
        <input type="checkbox" id="setting-expandall">
        <span>Expand all story links</span>
      </label>
      <label class="setting-row checkbox-row">
        <input type="checkbox" id="setting-showupdated">
        <span>Show updated stories</span>
      </label>

      <div class="settings-divider"></div>
      <h4 class="settings-subhead">Watch Words</h4>
      <input type="text" id="setting-watchwords" class="watch-words-input" placeholder="Xbox, Gaming, Longsight">
      <p class="settings-hint">Comma-separated. Stories matching any word are highlighted.</p>

      <div class="settings-divider"></div>
      <h4 class="settings-subhead">Categories</h4>
      <div id="category-prefs" class="category-prefs"></div>

      <button id="settings-close" class="settings-close">Close</button>
      <button id="settings-changelog" class="settings-close">Recent Updates</button>
    </div>
  </div>

  <div id="changelog-page" class="changelog-page hidden">
    <div class="changelog-content">
      <div class="changelog-header">
        <h3>Recent Updates</h3>
        <button id="changelog-close" class="changelog-close">&times;</button>
      </div>
      <div id="changelog-body"></div>
    </div>
  </div>

  <header class="masthead">
    <div class="masthead-left">
      <div class="masthead-date" id="masthead-date"></div>
      <button id="mode-toggle" class="mode-toggle" type="button">All</button>
    </div>
    <h1 class="masthead-title">The Daily Broadsheet</h1>
    <div class="masthead-right">
      <button id="search-toggle" class="masthead-icon" aria-label="Search">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/>
          <line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
      </button>
      <button id="settings-toggle" class="masthead-icon" aria-label="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
  </header>

  <div id="search-panel" class="search-panel hidden">
    <input type="search" id="filter" placeholder="Search the broadsheet..." autocomplete="off" />
    <div id="recent-searches" class="recent-searches"></div>
  </div>

  <main id="broadsheet" class="broadsheet">
    <div id="loading" class="loading">Loading today's news...</div>
  </main>

  <footer class="broadsheet-footer">
    <p>Generated by AI from <a href="https://currentsapi.services" target="_blank" rel="noopener">Currents API</a> &middot; Summarised via <a href="https://openrouter.ai" target="_blank" rel="noopener">OpenRouter</a></p>
  </footer>

  <script type="module" src="app.js"></script>
</body>
</html>
