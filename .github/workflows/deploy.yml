name: Build & Deploy

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 7,13,19 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Restore cache branch
        run: |
          git fetch origin cache-data 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/cache-data; then
            git checkout cache-data -- cache/ 2>/dev/null || true
          fi

      - name: Fetch latest news
        env:
          CURRENTSAPI_SERVICES_KEY: ${{ secrets.CURRENTSAPI_SERVICES_KEY }}
        run: node scripts/fetch-news.js

      - name: Summarise with LLM
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FEATHERLESS_API_KEY: ${{ secrets.FEATHERLESS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/summarise.js

      - run: npm run build

      - name: Save cache to cache-data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan cache-data 2>/dev/null || git checkout cache-data
          git rm -rf . --quiet 2>/dev/null || true
          mkdir -p cache
          git add cache/
          git commit -m "Update cache data $(date -u +%Y-%m-%dT%H:%M)" --allow-empty
          git push origin cache-data --force

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
