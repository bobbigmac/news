name: Build & Deploy

on:
  push:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'scripts/build.js'
      - 'package.json'
      - 'package-lock.json'
  schedule:
    - cron: '0 7,13,19 * * *'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Restore cache branch
        run: |
          git fetch origin cache-data 2>/dev/null || true
          if git show-ref --verify --quiet refs/remotes/origin/cache-data; then
            git checkout cache-data -- cache/ 2>/dev/null || true
          fi

      - name: Check cache freshness
        id: cache-check
        run: |
          if [ -f cache/currents-api.json ]; then
            AGE=$(( $(date +%s) - $(node -e "console.log(Math.floor(JSON.parse(require('fs').readFileSync('cache/currents-api.json')).fetchedAt/1000))") ))
            TTL=21600
            if [ "$AGE" -lt "$TTL" ]; then
              echo "fresh=true" >> $GITHUB_OUTPUT
              echo "Cache is fresh (${AGE}s old), skipping fetch"
            else
              echo "fresh=false" >> $GITHUB_OUTPUT
              echo "Cache is stale (${AGE}s old), will fetch"
            fi
          else
            echo "fresh=false" >> $GITHUB_OUTPUT
            echo "No cache file, will fetch"
          fi

      - name: Fetch latest news
        if: steps.cache-check.outputs.fresh != 'true' || github.event_name == 'schedule'
        env:
          CURRENTSAPI_SERVICES_KEY: ${{ secrets.CURRENTSAPI_SERVICES_KEY }}
          SEARCH_PLUGINS: ${{ secrets.SEARCH_PLUGINS }}
        run: node scripts/fetch-news.js

      - name: Summarise with LLM
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          FEATHERLESS_API_KEY: ${{ secrets.FEATHERLESS_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: node scripts/summarise.js

      - run: npm run build

      - name: Save cache to cache-data branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout --orphan cache-data 2>/dev/null || git checkout cache-data
          git rm -rf . --quiet 2>/dev/null || true
          mkdir -p cache
          git add cache/
          git commit -m "Update cache data $(date -u +%Y-%m-%dT%H:%M)" --allow-empty
          git push origin cache-data --force

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
